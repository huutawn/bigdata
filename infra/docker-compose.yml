services:
  nats:
    image: nats:2.10.22-alpine
    command:
      - "-js"
      - "-m"
      - "8222"
    ports:
      - "${NATS_CLIENT_PORT:-4222}:4222"
      - "${NATS_HTTP_PORT:-8222}:8222"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://localhost:8222/healthz > /dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: "${NATS_MEMORY_LIMIT:-128m}"
    networks:
      - aiops

  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
    volumes:
      - ../analytics/sql/create_processed_logs.sql:/docker-entrypoint-initdb.d/001-create_processed_logs.sql:ro
      - ../infra/clickhouse/users.d/default-user.xml:/etc/clickhouse-server/users.d/default-user.xml:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8123/ping | grep -q Ok. || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: "${CLICKHOUSE_MEMORY_LIMIT:-768m}"
    networks:
      - aiops

  grafana:
    image: grafana/grafana-oss:11.5.2
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - ../analytics/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../analytics/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      clickhouse:
        condition: service_healthy
    mem_limit: "${GRAFANA_MEMORY_LIMIT:-384m}"
    networks:
      - aiops

volumes:
  grafana-data:

networks:
  aiops:
    driver: bridge
